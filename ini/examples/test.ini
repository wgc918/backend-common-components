# ============================================================
# INI Parser 测试配置文件
# 覆盖常见使用场景与边界情况
# ============================================================

# --- 全局键值对（无节归属，自动归入 "Global" 节） ---
app_name = MyApplication
version  = 1.0.0
debug    = true

# --- 数据库配置 ---
[database]
host     = 127.0.0.1
port     = 3306
username = root
password = secret123
max_connections = 100
timeout  = 30.5
use_ssl  = true

# --- Redis 配置 ---
[redis]
host = 10.0.0.1
port = 6379
; 密码为空（边界情况：空值）
password =
db   = 0

# --- 日志配置 ---
[logging]
level    = INFO
; Windows 风格路径
path     = C:\Program Files\app\logs
max_size = 104857600
# 布尔值用字符串表示
enabled  = true
format   = [%Y-%m-%d %H:%M:%S] %(levelname)s: %(message)s

# --- 前后空格测试 ---
[whitespace]
   leading_spaces_key    =    value with leading spaces   
trailing_spaces_value = trailing_spaces_value   
   both_sides   =    surrounded by spaces   

# --- 注释与空行混合 ---
[network]

; 分号注释
# 井号注释
ip      = 192.168.1.100
subnet  = 255.255.255.0
gateway = 192.168.1.1

# --- 特殊字符 ---
[special]
url       = https://example.com/api?v=1&lang=zh
email     = admin@example.com
path      = /usr/local/bin:/usr/bin:/bin
json_like = {"key": "value", "num": 42}

# --- 空节（无键值对） ---
[empty_section]

# --- 单键节 ---
[cache]
ttl = 3600

# --- 数值边界 ---
[bounds]
max_int      = 2147483647
min_int      = -2147483648
max_double   = 1.7976931348623157e+308
min_double   = 2.2250738585072014e-308
negative_num = -123.456
zero         = 0